name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build_type: [Debug, Release]
    steps:
      - uses: actions/checkout@v4

      - name: Install aarch64 cross-compiler and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            qemu-user-static binfmt-support

      - name: Configure CMake (aarch64 cross-compile, ${{ matrix.build_type }})
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_ASM_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_CROSSCOMPILING_EMULATOR="qemu-aarch64-static;-L;/usr/aarch64-linux-gnu"

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run unit tests
        run: cd build && ctest --output-on-failure -j$(nproc)

      - name: Run integration tests
        run: |
          export CC="qemu-aarch64-static -L /usr/aarch64-linux-gnu ./build/free-cc"
          sh test/integration/run_tests.sh || true

      - name: Run corpus tests (features + stress)
        run: |
          export CC="aarch64-linux-gnu-gcc"
          export CFLAGS="-std=c89 -pedantic -w"
          sh test/corpus/run_corpus.sh || true

  sanitizers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install aarch64 cross-compiler and QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            qemu-user-static binfmt-support

      - name: Configure CMake (ASan + UBSan)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_ASM_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_CROSSCOMPILING_EMULATOR="qemu-aarch64-static;-L;/usr/aarch64-linux-gnu" \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

      - name: Build with sanitizers
        run: cmake --build build -j$(nproc)

      - name: Run unit tests under sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=0
          UBSAN_OPTIONS: print_stacktrace=1:halt_on_error=1
          QEMU_LD_PREFIX: /usr/aarch64-linux-gnu
        run: cd build && ctest --output-on-failure -j$(nproc)

  szdiff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Count LOC on PR branch
        id: pr
        run: |
          total=0
          for f in $(find src include -name '*.c' -o -name '*.h' -o -name '*.S'); do
            lines=$(wc -l < "$f")
            total=$((total + lines))
          done
          echo "loc=$total" >> "$GITHUB_OUTPUT"

      - name: Count LOC on base branch
        id: base
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          total=0
          for f in $(find src include -name '*.c' -o -name '*.h' -o -name '*.S' 2>/dev/null); do
            lines=$(wc -l < "$f")
            total=$((total + lines))
          done
          echo "loc=$total" >> "$GITHUB_OUTPUT"

      - name: Compute diff and comment
        uses: actions/github-script@v7
        with:
          script: |
            const baseLoc = parseInt('${{ steps.base.outputs.loc }}') || 0;
            const prLoc = parseInt('${{ steps.pr.outputs.loc }}') || 0;
            const diff = prLoc - baseLoc;
            const sign = diff >= 0 ? '+' : '';
            const pct = baseLoc > 0 ? ((diff / baseLoc) * 100).toFixed(1) : 'N/A';

            const body = [
              '## szdiff',
              '',
              '| Metric | Lines |',
              '|--------|------:|',
              `| Base | ${baseLoc.toLocaleString()} |`,
              `| PR | ${prLoc.toLocaleString()} |`,
              `| **Diff** | **${sign}${diff.toLocaleString()} (${sign}${pct}%)** |`,
              '',
              '_Source lines in `src/` and `include/` (*.c, *.h, *.S)_',
            ].join('\n');

            // Update or create comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('## szdiff'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
